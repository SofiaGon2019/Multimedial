<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Multimedial - Sofía G.</title>
  <style>
    /* 1. CONFIGURACIÓN GENERAL */
    body {
      background-color: #0A1030; /* Azul oscuro */
      color: white;              /* Texto blanco para que resalte */
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;    /* Elementos uno debajo de otro */
      align-items: center;       /* Centrado horizontal */
      min-height: 100vh;         /* Ocupa toda la pantalla */
      padding: 20px;
    }

    /* 2. CONTENEDOR FLEX (Ejercicio 2) */
    .contenedor {
      display: flex;
      gap: 20px;                 /* Espacio uniforme entre bloques */
      margin-top: 20px;
    }

    /* 3. BLOQUES CON HOVER (Ejercicio 1) */
    .bloque {
      background-color: #520C24; /* Guinda */
      padding: 15px 25px;
      border-radius: 8px;
      transition: 0.3s;          /* Suaviza el cambio de color */
    }

    .bloque:hover {
      background-color: #aa3be2; /* Brilla al pasar el mouse */
      transform: scale(1.2);     /* Crece un poquito */
    }

    .bloque a {
      color: white;
      text-decoration: none;     /* Quita el subrayado feo */
      font-size: 20px;
    }

    /* 4. IMAGEN CONTROLADA (Ejercicio 4) */
    img {
      width: 250px;
      height: 300px;
      object-fit: cover;         /* No se deforma */
      border: 0px solid white;
      border-radius: 10px;
      margin: 20px 0;
    }

    h1 { margin-bottom: 0; }
    h2 { margin-top: 0; color: #aaa; }
  </style>
</head>

<body>

  <h1>MEDIAL</h1>
  <h2>2026</h2>
  <p>Sofía G.</p>

  <img src="img/IMG_3095.jpeg" alt="Obra de Sofía">

  <div class="contenedor">
    <div class="bloque">
      <a href="pagina1.html">Obras</a>
    </div>
    <div class="bloque">
      <a href="pagina2.html">Contacto</a>
    </div>
  </div>

</body>
</html>
