<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Obras - Sofia G.</title>
    <style>
        /* Estilo general */
        body {
            font-family: Arial, sans-serif;
            background-color: #0A1030; /* Fondo oscuro */
            margin: 0;
            padding: 40px 20px;
            color: #333;
        }

        /* Encabezado: Título y Botones */
        .cabecera {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .btn-simple {
            display: inline-block;
            background-color: #520C24; /* Color Guinda */
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin: 5px;
        }

        /* Grilla de 4 columnas */
        .contenedor-obras {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 4 bloques por fila */
            gap: 30px;
            max-width: 1200px;
            margin: auto;
            align-items: start; /* Evita que los bloques se estiren verticalmente si uno es más largo */

        }

        /* Bloque simple */
        .bloque-link {
            text-decoration: none; /* Quita el subrayado del link */
            color: inherit;
        }

        .bloque {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: left;
            transition: 0.3s;
            height: 100%;
        }

        .bloque:hover {
            transform: translateY(-5px); /* Pequeña animación al pasar el mouse */
        }

        .bloque img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .bloque h2 {
            font-size: 18px;
            margin: 0 0 10px 0;
            color: #520C24;
        }

        .bloque p {
            font-size: 14px;
            margin: 0;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="cabecera">
        <h1>Dajes de la infancia</h1>
        <a href="index.html" class="btn-simple">Inicio</a>
        <a href="pagina2.html" class="btn-simple">Contacto</a>
        <a href="pagina1.html" class="btn-simple">Regresar</a>
        <a href="info dajes.html" class="btn-simple">Informacion</a>
    </div>

    <div class="contenedor-obras">

        <a href="mirandote.html" class="bloque-link">
            <div class="bloque">
                <img src="img/jumbo estatua.jpeg" alt="Obra 1">
                <h2>"Mirarte"</h2>
                <p>Acuarela. A4. 2026.</p>
            </div>
        </a>

        <a href="obra2.html" class="bloque-link">
            <div class="bloque">
                <img src="img/angel muñeca.jpeg" alt="Obra 2">
                <h2>"Contrapuesta"</h2>
                <p>Monotipo. Serie "Dientes"</p>
            </div>
        </a>

        <a href="obra3.html" class="bloque-link">
            <div class="bloque">
                <img src="img/rana sin brazos.jpeg" alt="Obra 3">
                <h2>"Cintura"</h2>
                <p>Monotipo. Serie "Dientes"</p>
            </div>
        </a>

        <a href="pagina2.html" class="bloque-link">
            <div class="bloque">
                <img src="img/monito.jpeg" alt="Contacto">
                <h2>"En dos"</h2>
                <p>Haz clic para más información.</p>
            </div>
        </a>

    </div>

</body>
</html>
