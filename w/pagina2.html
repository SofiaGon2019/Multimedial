<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto - Sofia G.</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0A1030;
            color: #333;
            margin: 0;
            padding: 20px 0;
        }

        .contenedor {
            width: 60%;
            margin: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* BLOQUE CÉDULA */
        .bloque-cedula {
            background: linear-gradient(135deg, #f6d0e8 0%, #bbdefb 100%);
            margin: 15px 0;
            padding: 25px;
            border-radius: 15px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #90caf9;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Marcas de agua decorativas (opcional para más realismo) */
        .bloque-cedula::after {
            content: "CHILE";
            position: absolute;
            bottom: -10px;
            right: 10px;
            font-size: 60px;
            color: rgba(21, 101, 192, 0.05);
            font-weight: bold;
            pointer-events: none;
        }

        .cedula-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #1565c0;
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        .cedula-header h1 {
            font-size: 11px;
            margin: 0;
            color: #1565c0;
            text-transform: uppercase;
        }

        .cedula-header .tipo-doc {
            font-size: 10px;
            font-weight: bold;
            color: #e74a4a;
        }

        .cedula-body {
            display: flex;
            gap: 20px;
        }

        .cedula-foto {
            flex: 0 0 150px;
        }

        .cedula-foto img {
            width: 100%;
            height: 190px;
            object-fit: cover;
            border-radius: 4px;
            border: 2px solid #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .cedula-datos {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .label {
            font-size: 8px;
            color: #1565c0;
            font-weight: bold;
            text-transform: uppercase;
            display: block;
        }

        .valor {
            font-size: 13px;
            font-weight: bold;
            color: #1a1a1a;
            text-transform: uppercase;
        }

        /* Sección de Correo Específica */
        .campo-correo {
            margin-top: 5px;
            padding-top: 5px;
            border-top: 1px dashed rgba(21, 101, 192, 0.3);
        }

        .valor-correo {
            text-transform: lowercase; /* El correo suele ir en minúsculas */
            font-size: 12px;
            color: #c62828; /* Color destacado para contacto */
        }

        /* BOTÓN INSTAGRAM ESTILO "FIRMA / SMART CHIP" */
        .seccion-inferior {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .firma-contenedor {
            flex: 1;
        }

        .btn-instagram {
            display: inline-block;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid #1565c0;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            color: #1565c0;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            transition: 0.3s;
            font-family: 'Courier New', Courier, monospace; /* Fuente estilo firma digital */
        }

        .btn-instagram:hover {
            background: #1565c0;
            color: #fff;
            transform: translateY(-2px);
        }

        /* BOTONES DE NAVEGACIÓN EXTERNOS */
        .interactivo {
            background-color: #520C24;
            margin: 10px 0;
            padding: 12px 25px;
            border-radius: 8px;
            transition: 0.3s;
            cursor: pointer;
            width: fit-content;
        }
        
        .interactivo:hover {
            background-color: #8b1981;
            transform: scale(1.05);
        }

        .interactivo a {
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="contenedor">

        <div class="bloque-cedula">
            <div class="cedula-header">
                <h1>República de Chile<br><span style="font-size: 7px;">Servicio de Registro Civil e Identificación</span></h1>
                <div class="tipo-doc">CÉDULA DE IDENTIDAD</div>
            </div>

            <div class="cedula-body">
                <div class="cedula-foto">
                    <img src="img/foto.png" alt="Foto Sofia G.">
                </div>

                <div class="cedula-datos">
                    <div class="campo">
                        <span class="label">Apellidos</span>
                        <span class="valor">González Antigual</span>
                    </div>
                    <div class="campo">
                        <span class="label">Nombres</span>
                        <span class="valor">Sofia Carlota</span>
                    </div>
                    <div class="campo">
                        <span class="label">Nacionalidad</span>
                        <span class="valor">Chilena</span>
                    </div>
                    
                    <div class="campo campo-correo">
                        <span class="label">Correo Electrónico</span>
                        <span class="valor valor-correo">ssgonzalezantigual@gmail.com</span>
                    </div>

                    <div class="campo">
                        <span class="label">RUN</span>
                        <span class="valor" style="color: #c62828;">12.345.678-K</span>
                    </div>
                </div>
            </div>

            <div class="seccion-inferior">
                <div class="firma-contenedor">
                    <span class="label" style="margin-bottom: 5px;">Redes Sociales</span>
                    <a href="https://www.instagram.com/petazetha_/" target="_blank" class="btn-instagram">
                        VER_INSTAGRAM_@petazetha_
                    </a>
                </div>
                <div style="text-align: right; opacity: 0.5;">
                    <span class="label">Osorno/Santiago</span>
                    <span class="valor" style="font-size: 10px;">2026</span>
                </div>
            </div>
        </div>

        <div class="interactivo">
            <a href="pagina1.html">Obras</a>
        </div> 

        <div class="interactivo">
            <a href="index.html">Inicio</a>
        </div>

    </div>

</body>
</html>
