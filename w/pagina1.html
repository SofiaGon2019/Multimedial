<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Obras - Sofia G.</title>
    <style>
        /* Estilo general */
        body {
            font-family: Arial, sans-serif;
            background-color: #0A1030; 
            margin: 0;
            padding: 40px 20px;
            color: #333;
        }

        /* Encabezado: Título y Botones */
        .cabecera {
            text-align: center;
            margin-bottom: 40px;
            color: #ffffff; /* Cambiado a oscuro para que se vea sobre fondo blanco */
        }

        .btn-simple {
            display: inline-block;
            background-color: #520C24; /* Color Guinda */
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 20px;
            margin: 5px;
        }

        /* Grilla de 4 columnas */
        .contenedor-obras {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 1200px;
            margin: auto;
        }

        .bloque-link {
            text-decoration: none;
            color: inherit;
        }

        /* --- BLOQUE CON BORDE ACTUALIZADO --- */
        .bloque {
            background-color: white;
            padding: 20px;
            border-radius: 20x;
            
            /* Se añade estilo y grosor para que el color sea visible */
            border: 10px solid #0A1030; 
            
            text-align: left;
            transition: 0.3s;
            height: 100%;
            box-sizing: border-box; /* Asegura que el borde no agrande el bloque */
        }

        .bloque:hover {
            transform: translateY(-5px);
            border-color: #520C24; /* El borde cambia a guinda al pasar el mouse */
        }

        .bloque img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .bloque h2 {
            font-size: 18px;
            margin: 0 0 10px 0;
            color: #520C24;
        }

        .bloque p {
            font-size: 14px;
            margin: 0;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="cabecera">
        <h1>Obras</h1>
        <a href="index.html" class="btn-simple">Inicio</a>
        <a href="pagina2.html" class="btn-simple">Contacto</a>
    </div>

    <div class="contenedor-obras">
        <a href="dientes.html" class="bloque-link">
            <div class="bloque">
                <img src="img/IMG_3095.jpeg" alt="Obra 1">
                <h2>Serie "Dientes"</h2>
                <p>Monotipos con acrilico. 2025.</p>
            </div>
        </a>

        <a href="somos 3.html" class="bloque-link">
            <div class="bloque">
                <img src="img/yo oleo.jpeg" alt="Obra 2">
                <h2>Diptico "Somos 3 Sofías"</h2>
                <p>Oleo sobre tela. 2025</p>
            </div>
        </a>

        <a href="Dajes de la infancai.html" class="bloque-link">
            <div class="bloque">
                <img src="img/jumbo estatua.jpeg" alt="Obra 3">
                <h2>Serie "Dajes de la infancia"</h2>
                <p>Acuarelas. 2026.</p>
            </div>
        </a>

        <a href="pagina2.html" class="bloque-link">
            <div class="bloque">
                <img src="img/placeholder.jpg" alt="Contacto">
                <h2>Contacto</h2>
                <p>Haz clic para más información.</p>
            </div>
        </a>
    </div>

</body>
</html>
