<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estructura con Divisiones</title>

    <style>
        /* Estilo general del cuerpo */
        body {
            font-family: Arial, sans-serif;
            background-color: #0A1030;
            margin: 0;
            color: white;
        }
        
        .cabecera {
            text-align: center;
            /* Aumentamos el padding superior para bajar todo el bloque */
            padding-top: 100px; 
            margin-bottom: 40px;
        }

        .cabecera h1 {
            margin-bottom: 20px; /* Espacio entre el título y los botones */
            font-size: 36px;
        }

        .btn-simple {
            display: inline-block;
            background-color: #520C24;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin: 5px;
        }

        .contenido-detalle {
            text-align: center;
            margin-top: 80px; /* Espacio adicional para el texto de abajo */
            padding: 0 20px;
        }

        .contenido-detalle h2 {
            font-size: 28px;
            margin-bottom: 15px;
        }

        .contenido-detalle p {
            font-size: 18px;
            line-height: 1.6;
        }
     </style>
</head>

<body>

    <div class="cabecera">
        <h1>Información "Dajes de la infancia"</h1>
        <a href="Dajes de la infancai.html" class="btn-simple">Regresar</a>
    </div>

    <div class="contenido-detalle">
        <h2>kkdfsogs</h2>
        <p>lxlackskvskb</p>
    </div>

</body>
</html>
